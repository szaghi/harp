name: Android

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "src/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - "src/**"
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Chaquopy's buildPython: must match chaquopy.defaultConfig.version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      # --rerun-tasks: the app embeds ../../src via Chaquopy from outside the
      # Gradle module; without it the Python-merge task can go UP-TO-DATE and
      # ship a stale bytecode bundle (old planner/catalog) in the artifact.
      - name: Build debug APK
        run: gradle -p android :app:assembleDebug --rerun-tasks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: harp-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
